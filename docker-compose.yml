version: '3.8'

services:
  cpabe-app:
    build: .
    container_name: cpabe-storage
    ports:
      - "5000:5000"
    environment:
      - STORAGE_MODE=local
      # For AWS S3 storage, uncomment and configure:
      # - STORAGE_MODE=s3
      # - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      # - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      # - AWS_REGION=${AWS_REGION:-us-east-1}
      # - S3_BUCKET_NAME=${S3_BUCKET_NAME:-cpabe-encrypted-files}
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      - LOG_LEVEL=INFO
    volumes:
      - ./encrypted_files:/app/encrypted_files
      - ./metadata:/app/metadata
      - ./cpabe_system.log:/app/cpabe_system.log
      - ./encryption.key:/app/encryption.key
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  default:
    name: cpabe-network
