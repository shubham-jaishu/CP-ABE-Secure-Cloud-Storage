<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CP-ABE Secure Cloud Storage - Test Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }
        
        input[type="file"],
        input[type="text"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input[type="file"]:focus,
        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
            font-family: monospace;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            font-size: 14px;
            word-wrap: break-word;
            display: none;
        }
        
        .result.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            display: block;
        }
        
        .result.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            display: block;
        }
        
        .result pre {
            margin-top: 10px;
            background: rgba(0, 0, 0, 0.05);
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 12px;
        }
        
        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        
        .metric-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        
        .metric-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        
        .metric-label {
            font-size: 0.9em;
            color: #666;
            margin-top: 5px;
        }
        
        .file-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .file-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }
        
        .file-item strong {
            color: #667eea;
        }
        
        .example {
            background: #e7f3ff;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 13px;
        }
        
        .example code {
            background: rgba(0, 0, 0, 0.1);
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
        }
        
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 CP-ABE Secure Cloud Storage</h1>
            <p>Policy-Based Encryption Demo Interface</p>
        </div>
        
        <div class="grid">
            <!-- Encrypt Section -->
            <div class="card">
                <h2>📤 Encrypt File</h2>
                <form id="encryptForm">
                    <div class="form-group">
                        <label for="fileToEncrypt">Select File:</label>
                        <input type="file" id="fileToEncrypt" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="policy">Access Policy:</label>
                        <input type="text" id="policy" placeholder="Role=Doctor AND Department=CSE" required>
                        <div class="example">
                            Examples:
                            <br>• <code>Role=Doctor</code>
                            <br>• <code>Role=Doctor AND Department=CSE</code>
                            <br>• <code>Role=Admin OR Role=Manager</code>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn">🔒 Encrypt File</button>
                </form>
                
                <div id="encryptResult" class="result"></div>
            </div>
            
            <!-- Decrypt Section -->
            <div class="card">
                <h2>📥 Decrypt File</h2>
                <form id="decryptForm">
                    <div class="form-group">
                        <label for="encryptedFilename">Encrypted Filename:</label>
                        <input type="text" id="encryptedFilename" placeholder="encrypted_document.pdf" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="userAttributes">User Attributes (JSON):</label>
                        <textarea id="userAttributes" placeholder='{"Role": "Doctor", "Department": "CSE"}' required></textarea>
                        <div class="example">
                            Example:
                            <br><code>{"Role": "Doctor", "Department": "CSE"}</code>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn">🔓 Decrypt File</button>
                </form>
                
                <div id="decryptResult" class="result"></div>
            </div>
        </div>
        
        <div class="grid">
            <!-- System Metrics -->
            <div class="card">
                <h2>📊 System Metrics</h2>
                <button onclick="loadMetrics()" class="btn">Refresh Metrics</button>
                <div id="metricsDisplay" class="metrics"></div>
            </div>
            
            <!-- File List -->
            <div class="card">
                <h2>📋 Encrypted Files</h2>
                <button onclick="loadFiles()" class="btn">Refresh List</button>
                <div id="fileList" class="file-list" style="margin-top: 15px;"></div>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = 'http://localhost:8080';
        
        // Encrypt Form Handler
        document.getElementById('encryptForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fileInput = document.getElementById('fileToEncrypt');
            const policy = document.getElementById('policy').value;
            const resultDiv = document.getElementById('encryptResult');
            
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('policy', policy);
            
            try {
                resultDiv.innerHTML = '⏳ Encrypting...';
                resultDiv.className = 'result';
                resultDiv.style.display = 'block';
                
                const response = await fetch(`${API_BASE}/encrypt`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        <strong>✅ Encryption Successful!</strong>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                    // Auto-fill decrypt form
                    document.getElementById('encryptedFilename').value = data.encrypted_filename;
                    loadFiles(); // Refresh file list
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = `<strong>❌ Error:</strong> ${data.error}`;
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `<strong>❌ Connection Error:</strong> ${error.message}`;
            }
        });
        
        // Decrypt Form Handler
        document.getElementById('decryptForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const encryptedFilename = document.getElementById('encryptedFilename').value;
            const userAttributesText = document.getElementById('userAttributes').value;
            const resultDiv = document.getElementById('decryptResult');
            
            try {
                const userAttributes = JSON.parse(userAttributesText);
                
                resultDiv.innerHTML = '⏳ Checking access and decrypting...';
                resultDiv.className = 'result';
                resultDiv.style.display = 'block';
                
                const response = await fetch(`${API_BASE}/decrypt`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        encrypted_filename: encryptedFilename,
                        user_attributes: userAttributes
                    })
                });
                
                if (response.ok) {
                    // File download
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = encryptedFilename.replace('encrypted_', '');
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    document.body.removeChild(a);
                    
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `<strong>✅ Access Granted!</strong><br>File downloaded successfully.`;
                } else {
                    const data = await response.json();
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = `
                        <strong>❌ Access Denied</strong>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `<strong>❌ Error:</strong> ${error.message}`;
            }
        });
        
        // Load System Metrics
        async function loadMetrics() {
            const metricsDiv = document.getElementById('metricsDisplay');
            
            try {
                const response = await fetch(`${API_BASE}/metrics`);
                const data = await response.json();
                
                if (response.ok) {
                    const metrics = data.metrics;
                    metricsDiv.innerHTML = `
                        <div class="metric-card">
                            <div class="metric-value">${metrics.cpu_percent.toFixed(1)}%</div>
                            <div class="metric-label">CPU Usage</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-value">${metrics.memory_percent.toFixed(1)}%</div>
                            <div class="metric-label">Memory Usage</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-value">${metrics.disk_percent.toFixed(1)}%</div>
                            <div class="metric-label">Disk Usage</div>
                        </div>
                    `;
                }
            } catch (error) {
                metricsDiv.innerHTML = `<div style="color: red;">Error loading metrics</div>`;
            }
        }
        
        // Load File List
        async function loadFiles() {
            const fileListDiv = document.getElementById('fileList');
            
            try {
                const response = await fetch(`${API_BASE}/list`);
                const data = await response.json();
                
                if (response.ok && data.files.length > 0) {
                    fileListDiv.innerHTML = data.files.map(file => `
                        <div class="file-item">
                            <strong>${file.original_filename}</strong>
                            <br><small>Encrypted: ${file.encrypted_filename}</small>
                            <br><small>Policy: ${file.policy}</small>
                        </div>
                    `).join('');
                } else {
                    fileListDiv.innerHTML = '<p style="text-align: center; color: #999;">No encrypted files yet</p>';
                }
            } catch (error) {
                fileListDiv.innerHTML = `<div style="color: red;">Error loading files</div>`;
            }
        }
        
        // Load initial data
        loadMetrics();
        loadFiles();
        
        // Auto-refresh every 30 seconds
        setInterval(() => {
            loadMetrics();
        }, 30000);
    </script>
</body>
</html>
